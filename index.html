<body>
    <!-- Language Switcher -->
    <div class="language-switcher">
        <select id="languageSelect" onchange="changeLanguage()">
            <option value="en" selected>English</option>
            <option value="fr">Français</option>
            <option value="ro">Română</option>
        </select>
    </div>

    <!-- Main Content -->

            </div>

            <div class="right">
                <div class="content-card">
                    <!-- Name/Title -->
                    <h1 class="title">txrmsconditions</h1>
                    
                    <!-- Navigation Links -->
                    <nav class="navigation">
                        <a href="index.html">bio</a>
                        <a href="links.html">links</a>

        </div>

<blockquote style="font-style: italic; color: #555; padding: 12px 10px 28px 10px; margin: 0 0 24px 0; text-align: center; border-left: none;">
    “why do when you can don't”
</blockquote>


    <!-- Footer -->
    <footer class="footer">
        <!-- Footer content will be injected by content.js -->
    </footer>

    <script>
        function changeLanguage() {
            const select = document.getElementById('languageSelect');
            const selectedLang = select.value;
            
            if (selectedLang === 'fr') {
                window.location.href = 'fr.html';
            } else if (selectedLang === 'ro') {
                window.location.href = 'ro.html';
            } else if (selectedLang === 'en') {
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
